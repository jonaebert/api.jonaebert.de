services:
  api:
    build: .
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD-SHELL
        - 'curl -s -X GET -f http://localhost:8000/health > /dev/null || wget -q -O- http://localhost:8000/health > /dev/null'
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s